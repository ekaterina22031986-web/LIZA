<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Лизы </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --hot-pink: #ff1493;
            --soft-pink: #ffb6c1;
            --lavender: #e6e6fa;
            --candy: #ff99cc;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', cursive, sans-serif;
            background: #fff0f5; overflow: hidden;
            scroll-behavior: smooth;
        }

        /* Волшебный шлейф за курсором */
        .sparkle {
            position: absolute; width: 6px; height: 6px;
            background: var(--hot-pink); border-radius: 50%;
            pointer-events: none; z-index: 9999;
        }

        .page { display: none; width: 100%; min-height: 100vh; position: relative; }
        .active { display: block; }

        /* СТРАНИЦА 1: Розовая Матрица */
        #p1 { background: linear-gradient(135deg, #ffe4e1 0%, #ffc0cb 100%); }
        #matrix-canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.6; }
        
        .p1-ui {
            position: relative; z-index: 10; text-align: center;
            padding-top: 15vh; color: var(--hot-pink); pointer-events: none;
        }
        h1 { 
            font-size: 3rem; text-shadow: 2px 2px 10px rgba(255,20,147,0.2);
            animation: softGlow 2s infinite alternate; 
        }
        
        @keyframes softGlow {
            from { transform: scale(1); text-shadow: 0 0 10px var(--soft-pink); }
            to { transform: scale(1.02); text-shadow: 0 0 20px var(--hot-pink); }
        }

        #catch-btn {
            position: absolute; z-index: 100; padding: 20px 40px;
            font-size: 22px; cursor: pointer; border: none; border-radius: 30px;
            background: white; color: var(--hot-pink);
            box-shadow: 0 10px 20px rgba(255, 102, 178, 0.3);
            top: 55%; left: 50%; transform: translate(-50%, -50%);
            font-weight: bold; transition: 0.1s;
        }

        /* СТРАНИЦА 2: Нежный спуск */
        #page2 {
            background: linear-gradient(to bottom, #ffc0cb, #e6e6fa);
        }
        .p2-container { height: 200vh; display: flex; flex-direction: column; align-items: center; }
        .p2-text { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; 
            color: white; font-size: 45px; text-shadow: 2px 2px 5px var(--hot-pink);
        }

        #p2-btn { 
            padding: 20px 50px; font-size: 24px; border-radius: 40px; border: 4px solid white;
            cursor: pointer; background: var(--hot-pink); color: white;
            box-shadow: 0 10px 25px rgba(255, 20, 147, 0.4);
        }

        /* СТРАНИЦА 3: Котики в саду */
        #page3 { background: #fff; background-image: radial-gradient(#ffdae0 2px, transparent 2px); background-size: 30px 30px; }
        .kitten-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; padding: 40px; }
        .kitten-card { position: relative; cursor: pointer; }
        .kitten-grid img { 
            width: 200px; height: 200px; object-fit: cover; 
            border-radius: 20% 20% 20% 20%; border: 10px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.5s;
        }
        .kitten-card:hover img { transform:translateY(-15px) rotate(5deg); border-color: var(--soft-pink) ; }

        /* СТРАНИЦА 4: Цветочный финал */
        #page4 { background: #fff5f7; }
        .floating-heart {
            position: absolute; pointer-events: none; z-index: 5;
            filter: drop-shadow(0 0 5px rgba(255,102,178,0.5));
        }

        #forgive-btn { 
            padding: 25px 60px; font-size: 35px; border-radius: 50px; border: none; 
            cursor: pointer; background: var(--hot-pink); color: white;
            box-shadow: 0 15px 40px rgba(255, 20, 147, 0.4);
        }

        .section { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-size: 35px; color: var(--hot-pink); font-weight: bold;
        }
        .final-box { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px);
            padding: 60px; border-radius: 50px; border: 2px solid var(--soft-pink);
            max-width: 600px; text-align: center; box-shadow: 0 20px 50px rgba(255, 182, 193, 0.5);
        }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <canvas id="matrix-canvas"></canvas>
        <div class="p1-ui">
            <h1>Лиза, во первых я заебался, во вторых нажми на кнопку ✨</h1>
            <div id="sub-title" style="display:none; color: #cc1177; font-weight: bold;">Тут кое-что для тебя! 🌸</div>
        </div>
        <button id="catch-btn">Нажми на меня 🐾</button>
    </div>

    <div id="p2" class="page">
        <div class="p2-container">
            <div class="p2-text">
                <span class="floating">Прокрути вниз... 🎀</span>
            </div>
            <div style="height: 100vh; display: flex; align-items: center;">
                <button id="p2-btn">Лови момент! 🌸</button>
            </div>
        </div>
    </div>

    <div id="p3" class="page">
        <h2 style="color: var(--hot-pink); font-size: 28px; margin-top: 40px; text-align: center;">Кто сегодня милее всего? 😍</h2>
        <div class="kitten-grid">
            <div class="kitten-card" onclick="transitionToFinal()"><img src="кот.jpg"></div>
            <div class="kitten-card" onclick="transitionToFinal()"><img src="лизка1.jpg"></div>
            <div class="kitten-card" onclick="transitionToFinal()"><img src="лизка2.jpg"></div>
            <div class="kitten-card" onclick="transitionToFinal()"><img src="лизка3.jpg"></div>
        </div>
    </div>

    <div id="p4" class="page">
        <div id="forgive-container" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
            <button id="forgive-btn">Простишь? 🙏</button>
        </div>
        <div id="long-site" style="display: none;">
            <div class="section"> ПРОКРУТИ В НИЗ🍬</div>
            <div class="section">ЕЩЁ НИЖЕ🧸</div>
            <div class="section">
                <div class="final-box">
                    <h2 style="margin-top:0">Лиза</h2>
                    <p>Прости, что расстроил тебя вчера.,</p>
                    <p style="font-size: 18px; color: var(--candy);">при встрече c меня шоколадка  🍫</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Эффект пыльцы за мышкой
        document.addEventListener('mousemove', (e) => {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = e.pageX + 'px';
            sparkle.style.top = e.pageY + 'px';
            document.body.appendChild(sparkle);
            
            gsap.to(sparkle, {
                opacity: 0, 
                y: -50, 
                x: (Math.random() - 0.5) * 50, 
                duration: 1, 
                onComplete: () => sparkle.remove()
            });
        });

        function showPage(num) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.remove('active'));
            const nextElem = document.getElementById('p' + num);
            nextElem.classList.add('active');
            
            gsap.from(nextElem, { opacity: 0, scale: 0.9, duration: 1 });

            if (num === 2 || (num === 4 && isFinalMode)) {
                document.body.style.overflowY = 'auto';
            } else {
                document.body.style.overflowY = 'hidden';
            }
        }

        // --- РОЗОВАЯ МАТРИЦА ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const columns = Math.floor(width / 20);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(255, 240, 245, 0.1)';
            ctx.fillRect(0, 0, width, height);
            ctx.font = '15px cursive';
            for (let i = 0; i < drops.length; i++) {
                const text = "🌸❤️✨"[Math.floor(Math.random() * 3)];
                ctx.fillStyle = "#ff66b2";
                ctx.fillText(text, i * 20, drops[i] * 20);
                if (drops[i] * 20 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 70);

        // --- КНОПКА П1 ---
        let p1Clicks = 0;
        const catchBtn = document.getElementById('catch-btn');
        catchBtn.addEventListener('click', () => {
            p1Clicks++;
            if (p1Clicks === 1) {
                gsap.to("#sub-title", { display: 'block', opacity: 1, duration: 1 });
            }
            if (p1Clicks >= 5) {
                showPage(2);
            } else {
                const x = Math.random() * (window.innerWidth - 200) + 100;
                const y = Math.random() * (window.innerHeight - 100) + 50;
                gsap.to(catchBtn, { left: x, top: y, duration: 0.2, backgroundColor: '#ff1493', color: '#fff' });
            }
        });

        document.getElementById('p2-btn').addEventListener('click', () => showPage(3));

        // --- ФИНАЛ ---
        let isFinalMode = false;
        function transitionToFinal() {
            showPage(4);
            startHeartRain();
        }

        let p4Clicks = 0;
        document.getElementById('forgive-btn').addEventListener('click', (e) => {
            p4Clicks++;
            if (p4Clicks === 1) {
                gsap.to("#p4", { background: "#fff", duration: 1 });
                e.target.innerText = "ТОЧНО? 🥰";
            } else {
                isFinalMode = true;
                document.getElementById('forgive-container').style.display = 'none';
                document.getElementById('long-site').style.display = 'block';
                document.body.style.overflowY = 'auto';
            }
        });

        function startHeartRain() {
            const emojis = ['🌸', '❤️', '✨', '🍭', '🎀'];
            setInterval(() => {
                const h = document.createElement('div');
                h.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
                h.className = 'floating-heart';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.top = '-20px';
                h.style.fontSize = (Math.random() * 20 + 20) + 'px';
                document.getElementById('p4').appendChild(h);

                gsap.to(h, {
                    y: window.innerHeight + 100,
                    x: (Math.random() - 0.5) * 300,
                    rotation: Math.random() * 720,
                    duration: Math.random() * 4 + 3,
                    ease: "none",
                    onComplete: () => h.remove()
                });
            }, 250);
        }
    </script>
</body>
</html>
